name: C Hello World

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # This environment variable forces ALL actions in this job to use Node 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Code
        # v5 officially supports Node 24 and removes the warning
        uses: actions/checkout@v5
      
      - name: Compile
        run: gcc hello.c -o hello
        
      - name: Run
        run: ./hello
